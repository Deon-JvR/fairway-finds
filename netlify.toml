[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[build]
  functions = "netlify/functions"

[images]
  remote_images = ["https://pyisbtqrwzqxlteibdqp\\.supabase\\.co/storage/v1/object/public/.*"]

[[edge_functions]]
  function = "listing-seo"
  path = "/listing/*"

[[edge_functions]]
  function = "category-seo"
  path = "/browse/category/*"

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/sell"
  to = "/create-listing"
  status = 301
  force = true

[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/seo-sitemap"
  status = 200
  force = true

[[redirects]]
  from = "/listing/*"
  to = "/listing.html"
  status = 200

[[redirects]]
  from = "/browse/category/*"
  to = "/browse.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://www.googletagmanager.com; connect-src 'self' https://pyisbtqrwzqxlteibdqp.supabase.co https://www.google-analytics.com https://*.google-analytics.com https://*.analytics.google.com https://www.googletagmanager.com; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; frame-src https://www.googletagmanager.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests"
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(self)"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.avif"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
